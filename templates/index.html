<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antibiograma - Análise Clínica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page-background"></div>
  
  <div class="container">
    <div class="header">
      <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75z" />
        </svg>
      </div>
      <h1>Laudo de Antibiograma</h1>
      <p class="subtitle">Análise clínica de sensibilidade antimicrobiana</p>
    </div>

    <form method="post" class="clinical-form">
      <div class="form-group">
        <label for="microorganismo">Microrganismo Isolado</label>
        <div class="select-wrapper">
          <select id="microorganismo" name="microorganismo" onchange="this.form.submit()">
            {% for micro in micro_list %}
              <option value="{{ micro }}" {% if micro == selected_micro %}selected{% endif %}>{{ micro }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="antibiotico">Agente Antimicrobiano</label>
        <div class="select-wrapper">
          <select id="antibiotico" name="antibiotico">
            {% for ab in antibios %}
              <option value="{{ ab }}">{{ ab }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="diametro">Diâmetro Medido do Halo (mm)</label>
        <input type="number" id="diametro" step="0.1" name="diametro" placeholder="Ex: 22.5" required>
      </div>

      <button type="submit" class="submit-btn">
        <span>Processar Laudo</span>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
        </svg>
      </button>
    </form>

    {% if resultado %}
      <div class="result-card {% if 'S' in resultado %}sensitive{% elif 'R' in resultado %}resistant{% else %}intermediate{% endif %}">
        <div class="result-header">Resultado da Análise</div>
        <div class="result-value">{{ resultado }}</div>
      </div>
    {% endif %}
    
    <div class="footer-info">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a.75.75 0 000 1.5h.253a.25.25 0 01.244.304l-.459 2.066A1.75 1.75 0 0010.747 15H11a.75.75 0 000-1.5h-.253a.25.25 0 01-.244-.304l.459-2.066A1.75 1.75 0 009.253 9H9z" clip-rule="evenodd" />
      </svg>
      Parâmetros baseados nas diretrizes oficiais BrCAST/EUCAST
    </div>
  </div>
</body>
</html>
